<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="manifest.json">
  <title>نظام إقفال الصناديق</title>
  <style>
    body{margin:0;font-family:Arial,Tahoma,sans-serif;background:#eef0f3;color:#111827;display:grid;place-items:center;min-height:100vh;text-align:center;padding:20px}
    .card{background:#fff;border:1px solid #ddd;border-radius:18px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.10);max-width:420px}
    img{width:96px;height:96px;border-radius:24px}
    a{display:inline-block;margin-top:16px;background:#111827;color:#fff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:800}
  </style>
</head>
<body>
  <div class="card">
    <img src="icon.png" alt="">
    <h1>نظام إقفال الصناديق</h1>
    <p>جاري فتح التطبيق...</p>
    <a href="https://aptco.netlify.app/?app=android">فتح التطبيق</a>
  </div>
  <script>location.replace("https://aptco.netlify.app/?app=android");</script>
</body>
</html>
