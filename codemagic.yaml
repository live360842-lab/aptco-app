workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: latest
    scripts:
      - npm install
      - npm install @capacitor/core @capacitor/android
      - npx cap add android || true
      - npx cap sync android
      - cd android
      - ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
